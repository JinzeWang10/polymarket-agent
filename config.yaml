scan_interval_minutes: 10
football_tag_id: 100350

# Penny picking scanner: buy 95-99¢ outcomes in late-game situations
penny_scan_interval_seconds: 60
penny_min_ask_price: 0.95
penny_min_depth_usd: 50
penny_pre_filter_price: 0.85
penny_dedup_cooldown_seconds: 1200
penny_scan_windows:
  - start_hour: 8
    end_hour: 13
    label: "NBA"

# World Cup structural arbitrage scanner
worldcup_enabled: true
worldcup_scan_interval_minutes: 5
worldcup_min_edge_cents: 1.0       # min locked profit per share (stage-chain)
worldcup_min_sum_edge_cents: 5.0   # min locked profit per set (slot-sum, multi-leg)
worldcup_min_depth_usd: 50
# Soft-chain value detection (+EV, not risk-free): cross-sectional stage-ratio anomalies
worldcup_value_enabled: true
worldcup_value_min_mid: 0.02
worldcup_value_ratio_low: 0.4    # flag if conditional ratio < 0.4x peer median
worldcup_value_ratio_high: 2.5   # flag if conditional ratio > 2.5x peer median
worldcup_value_min_edge_cents: 3.0
# Live lag scanner (+EV): in-play match moves vs stale structural markets
worldcup_live_lag_enabled: true
worldcup_live_interval_seconds: 60
worldcup_lag_window_minutes: 10
worldcup_lag_match_move_cents: 5.0
worldcup_lag_struct_move_cents: 1.5
worldcup_lag_cooldown_seconds: 900
worldcup_stages:
  - {slug: world-cup-winner, slots: 1, level: 6, label: 夺冠}
  - {slug: world-cup-nation-to-reach-final, slots: 2, level: 5, label: 进决赛}
  - {slug: world-cup-nation-to-reach-semifinals, slots: 4, level: 4, label: 进四强}
  - {slug: world-cup-nation-to-reach-quarterfinals, slots: 8, level: 3, label: 进八强}
  - {slug: world-cup-nation-to-reach-round-of-16, slots: 16, level: 2, label: 进十六强}
  - {slug: world-cup-team-to-advance-to-knockout-stages, slots: 32, level: 1, label: 小组出线}
worldcup_group_slugs:
  - world-cup-group-a-winner
  - world-cup-group-b-winner
  - world-cup-group-c-winner
  - world-cup-group-d-winner
  - world-cup-group-e-winner
  - world-cup-group-f-winner
  - world-cup-group-g-winner
  - world-cup-group-h-winner
  - world-cup-group-i-winner
  - world-cup-group-j-winner
  - world-cup-group-k-winner
  - world-cup-group-l-winner

